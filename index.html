<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SEGL Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Mono', monospace;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 32px 16px;
      transition: background 90s ease;
    }
    #center { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    #dvd-photo {
      position: fixed; z-index: 2; width: 180px;
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.18), 0 8px 32px rgba(0,0,0,0.55);
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #dvd-photo img { width: 100%; height: auto; display: block; }
    #dvd-photo.hidden { opacity: 0; pointer-events: none; }

    /* ── Pong overlay — truly fullscreen ── */
    #pong-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.0);
    }
    #pong-overlay.active { display: block; }
    #pong-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Countdown shown inside pong */
    #pong-clock {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #pong-clock .pc-time {
      font-family: 'DM Mono', monospace;
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 500;
      color: rgba(129,140,248,0.55);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    #pong-clock .pc-pct {
      font-family: 'DM Mono', monospace;
      font-size: clamp(11px, 1.2vw, 14px);
      color: rgba(148,163,184,0.35);
      margin-top: 4px;
    }

    /* Score top-centre */
    #pong-scorebar {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 32px;
      z-index: 10; pointer-events: none;
    }
    .pscore {
      font-family: 'DM Mono', monospace;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 500;
      color: rgba(34,211,238,0.55);
      min-width: 48px; text-align: center;
    }
    .pscore-divider {
      font-family: 'DM Mono', monospace;
      font-size: clamp(28px, 4vw, 48px);
      color: rgba(148,163,184,0.25);
    }

    #pong-hint {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(148,163,184,0.4);
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }
    #pong-close {
      position: absolute;
      top: 16px; right: 20px;
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.3);
      border-radius: 8px;
      color: rgba(129,140,248,0.7);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      z-index: 20;
      transition: background 0.2s;
    }
    #pong-close:hover { background: rgba(129,140,248,0.18); }
    #pong-difficulty {
      position: absolute;
      top: 16px; left: 20px;
      display: flex; gap: 8px;
      z-index: 20;
    }
    .diff-btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(148,163,184,0.6);
      cursor: pointer;
      transition: all 0.18s;
    }
    .diff-btn:hover { background: rgba(255,255,255,0.1); color: #f1f5f9; }
    .diff-btn.active { background: rgba(34,211,238,0.15); border-color: rgba(34,211,238,0.5); color: #67e8f9; }
    .diff-btn[data-diff="super"] { border-color: rgba(239,68,68,0.4); color: rgba(252,165,165,0.7); }
    .diff-btn[data-diff="super"]:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .diff-btn[data-diff="super"].active { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.8); color: #f87171; }
    .diff-btn[data-diff="impossible"] { border-color: rgba(168,85,247,0.4); color: rgba(216,180,254,0.6); letter-spacing: 0.03em; }
    .diff-btn[data-diff="impossible"]:hover { background: rgba(168,85,247,0.15); color: #e879f9; }
    .diff-btn[data-diff="impossible"].active { background: rgba(168,85,247,0.25); border-color: rgba(168,85,247,0.9); color: #e879f9; text-shadow: 0 0 8px rgba(232,121,249,0.8); }

    /* ── Fixed buttons ── */
    #music-btn, #pong-btn {
      position: fixed; bottom: 24px; z-index: 9999;
      background: rgba(129,140,248,0.15);
      border: 1.5px solid rgba(129,140,248,0.5);
      border-radius: 50%; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; outline: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    #music-btn { right: 24px; }
    #pong-btn  { right: 88px; }
    #music-btn:hover, #pong-btn:hover { background: rgba(129,140,248,0.28); border-color: rgba(129,140,248,0.85); transform: scale(1.08); }
    #music-btn:active, #pong-btn:active { transform: scale(0.96); }
    #music-btn svg, #pong-btn svg { width: 22px; height: 22px; fill: #a5b4fc; pointer-events: none; }

    #yt-container { position: fixed; left: 0; bottom: -350px; width: 480px; height: 270px; opacity: 0; pointer-events: none; z-index: 1; }

    .wrap { position: relative; z-index: 1; width: min(780px, 95vw); text-align: center; }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(22px, 3.5vw, 36px); font-weight: 400;
      letter-spacing: -0.01em; color: #f1f5f9; margin-bottom: 8px; padding-right: 0.2em;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .underline { width: 60px; height: 1.5px; background: linear-gradient(90deg,#818cf8,#c084fc); margin: 10px auto 28px; border-radius: 2px; }
    .countdown { font-size: clamp(26px,4.5vw,46px); font-weight: 500; letter-spacing: -0.03em; color: #818cf8; margin-bottom: 10px; }
    .sub { color: #94a3b8; font-size: clamp(11px,1.5vw,13px); letter-spacing: 0.04em; margin-bottom: 24px; }
    canvas#ring { width: min(500px,85vw); height: auto; display: block; margin: 0 auto; }
    @keyframes pulseGlow {
      0%   { filter: drop-shadow(0 0 0px rgba(129,140,248,0)); }
      40%  { filter: drop-shadow(0 0 28px rgba(129,140,248,0.6)); }
      100% { filter: drop-shadow(0 0 0px rgba(129,140,248,0)); }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="dvd-photo"><img id="dvd-img" src="" alt="" /></div>
  <div id="yt-container"><div id="yt-player"></div></div>

  <!-- Fullscreen Pong -->
  <div id="pong-overlay">
    <canvas id="pong-canvas"></canvas>
    <!-- countdown in the middle -->
    <div id="pong-clock">
      <div class="pc-pct" id="pong-pct">—% complete</div>
    </div>
    <!-- score -->
    <div id="pong-scorebar">
      <span class="pscore" id="ps-left">0</span>
      <span class="pscore-divider">—</span>
      <span class="pscore" id="ps-right">0</span>
    </div>
    <div id="pong-difficulty">
      <button class="diff-btn active" data-diff="easy">Easy</button>
      <button class="diff-btn" data-diff="medium">Medium</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
      <button class="diff-btn" data-diff="super">☠ Super</button>
      <button class="diff-btn" data-diff="impossible">⬡ Impossible</button>
    </div>
    <div id="pong-hint">↑ / ↓ to move &nbsp;|&nbsp; first to 7 wins &nbsp;|&nbsp; ☠ Super = predictive AI &nbsp;|&nbsp; ⬡ Impossible = unbeatable &nbsp;|&nbsp; ESC to close</div>
    <button id="pong-close">✕ close</button>
  </div>

  <div id="center">
    <div class="wrap">
      <h1>SEGL Countdown <em>&#128148;</em></h1>
      <div class="underline"></div>
      <div class="countdown" id="timeleft">&#8212;</div>
      <div class="sub" id="daterange">&#8212;</div>
      <canvas id="ring" width="900" height="900"></canvas>
    </div>
  </div>

  <button id="pong-btn" title="Play Pong" aria-label="Play Pong">
    <svg viewBox="0 0 24 24"><rect x="2" y="9" width="3" height="8" rx="1.5"/><rect x="19" y="5" width="3" height="8" rx="1.5"/><circle cx="12" cy="12" r="2"/></svg>
  </button>
  <button id="music-btn" title="Play music" aria-label="Toggle music">
    <svg id="icon-on" viewBox="0 0 24 24" style="display:none"><path d="M9 3v12.174A3 3 0 1 0 11 18V7h6V3H9z"/></svg>
    <svg id="icon-off" viewBox="0 0 24 24"><path d="M9 3v12.174A3 3 0 1 0 11 18V7h6V3H9z" opacity=".3"/><path d="M3.293 3.293a1 1 0 0 1 1.414 0l16 16a1 1 0 0 1-1.414 1.414l-16-16a1 1 0 0 1 0-1.414z"/></svg>
  </button>

  <script src="https://www.youtube.com/iframe_api"></script>

const END   = new Date("2026-05-23T12:00:00-04:00");

const HOUR_PALETTES = [
  [220,260],[215,255],[210,250],[205,245],[200,240],[195,230],[185,220],[175,210],
  [165,200],[155,190],[145,185],[135,175],[125,165],[130,170],[140,180],[155,195],
  [170,210],[185,225],[200,240],[210,250],[215,255],[218,258],[220,260],[220,260],
];
function lerp(a,b,t){return a+(b-a)*t;}
function updateBackground(){
  const now=new Date(),hr=now.getHours(),mf=now.getMinutes()/60;
  const [h1b,h1a]=HOUR_PALETTES[hr],[h2b,h2a]=HOUR_PALETTES[(hr+1)%24];
  const bg=Math.round(lerp(h1b,h2b,mf)),ac=Math.round(lerp(h1a,h2a,mf));
  document.body.style.background=`linear-gradient(135deg,hsl(${bg},45%,7%) 0%,hsl(${ac},50%,11%) 60%,hsl(${bg+20},40%,9%) 100%)`;
}

const pcanvas=document.getElementById("particles"),pctx=pcanvas.getContext("2d");
function resizeP(){pcanvas.width=window.innerWidth;pcanvas.height=window.innerHeight;}
resizeP();window.addEventListener("resize",resizeP);
function spawnP(){return{x:Math.random()*pcanvas.width,y:pcanvas.height+10,r:Math.random()*1.8+0.4,speed:Math.random()*0.35+0.08,drift:(Math.random()-0.5)*0.25,opacity:Math.random()*0.45+0.08,hue:Math.random()<0.5?240:280};}
const pts=[];
for(let i=0;i<65;i++){const p=spawnP();p.y=Math.random()*pcanvas.height;pts.push(p);}
function animP(){
  pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
  for(let i=0;i<pts.length;i++){const p=pts[i];p.y-=p.speed;p.x+=p.drift;if(p.y<-10)pts[i]=spawnP();pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fillStyle=`hsla(${p.hue},80%,75%,${p.opacity})`;pctx.fill();}
  requestAnimationFrame(animP);
}
animP();

const rc=document.getElementById("ring"),rctx=rc.getContext("2d");
function drawRing(frac){
  frac=Math.max(0,Math.min(1,frac));
  const w=rc.width,h=rc.height,cx=w/2,cy=h/2,r=Math.min(w,h)*0.36,lw=r*0.22;
  const sa=-Math.PI/2,ea=sa+frac*Math.PI*2;
  rctx.clearRect(0,0,w,h);
  rctx.beginPath();rctx.arc(cx,cy,r,0,Math.PI*2);rctx.strokeStyle="rgba(255,255,255,0.04)";rctx.lineWidth=lw+6;rctx.lineCap="round";rctx.stroke();
  rctx.beginPath();rctx.arc(cx,cy,r,0,Math.PI*2);rctx.strokeStyle="rgba(255,255,255,0.08)";rctx.lineWidth=lw;rctx.lineCap="round";rctx.stroke();
  const g=rctx.createLinearGradient(cx-r,cy,cx+r,cy);g.addColorStop(0,"#818cf8");g.addColorStop(1,"#c084fc");
  rctx.shadowColor="#818cf8";rctx.shadowBlur=18;
  rctx.beginPath();rctx.arc(cx,cy,r,sa,ea);rctx.strokeStyle=g;rctx.lineWidth=lw;rctx.lineCap="round";rctx.stroke();
  rctx.shadowBlur=0;
  const pct=(frac*100).toFixed(2);
  rctx.fillStyle="#f1f5f9";rctx.textAlign="center";rctx.textBaseline="middle";
  rctx.font="500 90px 'DM Mono',monospace";rctx.fillText(pct+"%",cx,cy);
  rctx.font="400 24px 'DM Mono',monospace";rctx.fillStyle="#94a3b8";rctx.fillText("complete",cx,cy+68);
}

function pad(n){return String(n).padStart(2,"0");}
function fmtDHMS(ms){ms=Math.max(0,ms);const s=Math.floor(ms/1000);return `${Math.floor(s/86400)}d ${pad(Math.floor((s%86400)/3600))}h ${pad(Math.floor((s%3600)/60))}m ${pad(s%60)}s left`;}
function fmtDate(d){return d.toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});}
let lastSec=-1;
function triggerPulse(){rc.style.animation="none";void rc.offsetWidth;rc.style.animation="pulseGlow 0.7s ease-out forwards";}

const dvdEl=document.getElementById("dvd-photo"),dvdImg=document.getElementById("dvd-img");
let photoIdx=0,dvdX=140,dvdY=100,dvdVX=2.3,dvdVY=1.9;
const imgEls=PHOTOS.map(src=>{const i=new Image();i.src=src;return i;});
function getH(){const img=imgEls[photoIdx];if(!img.naturalWidth)return 135;return Math.round(180*img.naturalHeight/img.naturalWidth);}
dvdImg.src=PHOTOS[0];
function swapPhoto(n){photoIdx=n%PHOTOS.length;dvdImg.src=PHOTOS[photoIdx];}
function dvdLoop(){
  const W=180,H=getH(),maxX=window.innerWidth-W,maxY=window.innerHeight-H;
  dvdX+=dvdVX;dvdY+=dvdVY;
  let b=false;
  if(dvdX<=0){dvdX=0;dvdVX=Math.abs(dvdVX);b=true;}else if(dvdX>=maxX){dvdX=maxX;dvdVX=-Math.abs(dvdVX);b=true;}
  if(dvdY<=0){dvdY=0;dvdVY=Math.abs(dvdVY);b=true;}else if(dvdY>=maxY){dvdY=maxY;dvdVY=-Math.abs(dvdVY);b=true;}
  if(b)swapPhoto(photoIdx+1);
  dvdEl.style.left=dvdX+"px";dvdEl.style.top=dvdY+"px";
  requestAnimationFrame(dvdLoop);
}
dvdLoop();

/* YouTube */
const musicBtn=document.getElementById("music-btn");
const iconOn=document.getElementById("icon-on"),iconOff=document.getElementById("icon-off");
let ytPlayer=null,ytReady=false,musicOn=false,pendingPlay=false;
function setMusicUI(on){iconOn.style.display=on?"block":"none";iconOff.style.display=on?"none":"block";musicBtn.title=on?"Pause music":"Play music";}
window.onYouTubeIframeAPIReady=function(){
  ytPlayer=new YT.Player("yt-player",{
    width:480,height:270,videoId:"FhGH-ma_7DM",
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,loop:1,playlist:"FhGH-ma_7DM",playsinline:1,rel:0},
    events:{
      onReady:function(e){
        ytReady=true;e.target.setVolume(80);
        if(pendingPlay){e.target.playVideo();musicOn=true;setMusicUI(true);pendingPlay=false;}
        setInterval(function(){
          if(!ytReady||!musicOn)return;
          try{var dur=ytPlayer.getDuration(),cur=ytPlayer.getCurrentTime();if(dur>0&&cur>=dur-3){ytPlayer.seekTo(0);ytPlayer.playVideo();}}catch(e){}
        },500);
      },
      onStateChange:function(e){if(e.data===YT.PlayerState.ENDED){ytPlayer.seekTo(0);ytPlayer.playVideo();}}
    }
  });
};
musicBtn.addEventListener("click",function(){
  if(!musicOn){
    if(ytReady){ytPlayer.playVideo();musicOn=true;setMusicUI(true);}
    else{pendingPlay=true;setMusicUI(true);}
  } else {
    if(ytReady)ytPlayer.pauseVideo();
    musicOn=false;pendingPlay=false;setMusicUI(false);
  }
});

   FULLSCREEN PONG
   Left paddle = AI (medium difficulty)
   Right paddle = player (↑ / ↓)
   Countdown clock floats in the centre
   ══════════════════════════════════════════ */
const pongOverlay = document.getElementById("pong-overlay");
const pongCanvas  = document.getElementById("pong-canvas");
const pc          = pongCanvas.getContext("2d");
const pongBtn     = document.getElementById("pong-btn");
const pongClose   = document.getElementById("pong-close");
const psLeft      = document.getElementById("ps-left");
const psRight     = document.getElementById("ps-right");
const pongTime    = document.getElementById("pong-time");
const pongPct     = document.getElementById("pong-pct");

const WIN_SCORE = 7;
let aiDifficulty = "easy"; // easy | medium | hard

// Difficulty settings: [speed, jitterScale, reactionZoneFraction]
const DIFF_SETTINGS = {
  easy:   { speed: 5.0,  jitter: 0.75, zone: 0.45 },
  medium: { speed: 7.5,  jitter: 0.45, zone: 0.58 },
  hard:   { speed: 10.5, jitter: 0.15, zone: 0.80 },
  super:  { speed: 22.0, jitter: 0.0,  zone: 1.0  },
  impossible: { speed: 999, jitter: 0.0, zone: 1.0 },
};
const PAD_W=14, PAD_H=90, BALL_R=10, PAD_MARGIN=24;
const PAD_SPEED=14;

let pong=null, pongRunning=false, pongRaf=null;
let PW=window.innerWidth, PH=window.innerHeight;

function resizePong(){
  PW=window.innerWidth; PH=window.innerHeight;
  pongCanvas.width=PW; pongCanvas.height=PH;
}
window.addEventListener("resize",()=>{ if(pongRunning) resizePong(); });

// Returns frames before second ball spawns, based on current difficulty
function b2Delay(){
  if(aiDifficulty==='impossible') return 120+Math.floor(Math.random()*60);  // ~2-3s
  if(aiDifficulty==='super') return 180+Math.floor(Math.random()*120);  // ~3-5s
  if(aiDifficulty==='hard')  return 240+Math.floor(Math.random()*180);  // ~4-7s
  if(aiDifficulty==='medium')return 420+Math.floor(Math.random()*240);  // ~7-11s
  return 600+Math.floor(Math.random()*300);                              // easy: ~10-15s
}

function makePong(){
  resizePong();
  return {
    lScore:0, rScore:0,
    lY:PH/2-PAD_H/2, rY:PH/2-PAD_H/2,
    rV:0,
    bx:PW/2, by:PH/2,
    bvx:(Math.random()>0.5?1:-1)*15,
    bvy:(Math.random()*6+5)*(Math.random()>0.5?1:-1),
    flash:0, winFlash:0, winner:null,
    serving:true, serveTimer:35,
    // AI state
    aiTarget:PH/2, aiJitter:0,
    // second ball
    b2active:false, b2x:0,b2y:0,b2vx:0,b2vy:0,b2flash:0,b2timer:0,
    b2spawnCountdown: b2Delay(),
  };
}

const keys={};
window.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(pongRunning&&["ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
  if(e.key==="Escape"&&pongRunning) closePong();
});
window.addEventListener("keyup",e=>{ keys[e.key]=false; });

function resetBall(g, toRight){
  g.bx=PW/2; g.by=PH/2;
  g.bvx=(toRight?1:-1)*15;
  g.bvy=(Math.random()*6+5)*(Math.random()>0.5?1:-1);
  g.serving=true; g.serveTimer=35;
}

/* ── Second ball helpers ── */
function spawnBall2(g){
  g.b2x=PW/2; g.b2y=PH/3+Math.random()*PH/3;
  g.b2vx=(Math.random()>0.5?1:-1)*12;
  g.b2vy=(Math.random()*6+5)*(Math.random()>0.5?1:-1);
  g.b2active=true; g.b2flash=0;
  g.b2timer=0; // frames alive
}
function removeBall2(g){ g.b2active=false; }

/* AI: medium difficulty
   - Tracks the ball with a delay (reacts only when ball is heading its way)
   - Has a fixed max speed slightly less than the player's
   - Adds occasional deliberate error (aiJitter)
   - Aims for ball y but not perfectly: targets ball +/- small offset */
function stepAI(g){
  const ds = DIFF_SETTINGS[aiDifficulty];
  const AI_SPEED = ds.speed;
  const REACTION_ZONE = PW * ds.zone;

  if(aiDifficulty === 'impossible'){
    // Teleport. No speed limit. No reaction delay. No mercy.
    g.lY = Math.max(0, Math.min(PH - PAD_H, g.by - PAD_H / 2));
    return; // skip the speed-limited move below
  } else if(aiDifficulty === 'super'){
    // Predictive: simulate ball bounces to find where it will reach lx
    if(g.bvx < 0){
      const lx = PAD_MARGIN + PAD_W;
      let sx = g.bx, sy = g.by, svx = g.bvx, svy = g.bvy;
      let steps = 0;
      while(sx > lx && steps < 600){
        sx += svx; sy += svy; steps++;
        if(sy - BALL_R <= 0){ sy = BALL_R; svy = Math.abs(svy); }
        if(sy + BALL_R >= PH){ sy = PH - BALL_R; svy = -Math.abs(svy); }
      }
      g.aiTarget = sy; // aim for exact landing spot
    } else {
      g.aiTarget = PH / 2; // ball going away — rest center
    }
  } else {
    if(Math.random()<0.025){
      g.aiJitter=(Math.random()-0.5)*PAD_H*ds.jitter;
    }
    if(g.bvx<0&&g.bx<REACTION_ZONE){
      g.aiTarget=g.by+g.aiJitter;
    } else {
      g.aiTarget=PH/2;
    }
  }

  const padCentre=g.lY+PAD_H/2;
  const diff=g.aiTarget-padCentre;
  const move=Math.sign(diff)*Math.min(AI_SPEED,Math.abs(diff));
  g.lY=Math.max(0,Math.min(PH-PAD_H,g.lY+move));
}

function pongStep(g){
  // Player right paddle
  if(keys["ArrowUp"])   g.rV=-PAD_SPEED;
  else if(keys["ArrowDown"]) g.rV=PAD_SPEED;
  else g.rV=0;
  g.rY=Math.max(0,Math.min(PH-PAD_H,g.rY+g.rV));

  // AI left paddle
  stepAI(g);

  if(g.serving){ g.serveTimer--; if(g.serveTimer<=0) g.serving=false; return; }
  if(g.winFlash>0){
    g.winFlash--;
    if(g.winFlash===0){ g.winner=null; resetBall(g, g.lScore>g.rScore); }
    return;
  }

  const prevBx=g.bx, prevBy=g.by;
  g.bx+=g.bvx; g.by+=g.bvy;

  // Top/bottom walls
  if(g.by-BALL_R<=0){g.by=BALL_R;g.bvy=Math.abs(g.bvy);g.flash=6;}
  if(g.by+BALL_R>=PH){g.by=PH-BALL_R;g.bvy=-Math.abs(g.bvy);g.flash=6;}

  // Left paddle (AI)
  const lx=PAD_MARGIN+PAD_W;
  if(g.bvx<0&&prevBx-BALL_R>lx&&g.bx-BALL_R<=lx&&g.by>=g.lY&&g.by<=g.lY+PAD_H){
    g.bvx=Math.abs(g.bvx)*1.06;
    const rel=(g.by-(g.lY+PAD_H/2))/(PAD_H/2);
    g.bvy=rel*8;
    g.bx=lx+BALL_R; g.flash=8;
  }
  // Right paddle (player)
  const rx=PW-PAD_MARGIN-PAD_W;
  if(g.bvx>0&&prevBx+BALL_R<rx&&g.bx+BALL_R>=rx&&g.by>=g.rY&&g.by<=g.rY+PAD_H){
    g.bvx=-Math.abs(g.bvx)*1.06;
    const rel=(g.by-(g.rY+PAD_H/2))/(PAD_H/2);
    g.bvy=rel*8;
    g.bx=rx-BALL_R; g.flash=8;
  }

  // Cap speed
  const spd=Math.sqrt(g.bvx*g.bvx+g.bvy*g.bvy);
  if(spd>36){g.bvx=g.bvx/spd*36;g.bvy=g.bvy/spd*36;}

  // Scoring
  if(g.bx<0){
    g.rScore++;
    if(g.rScore>=WIN_SCORE){g.winner="right";g.winFlash=100;g.lScore=0;g.rScore=0;}
    else resetBall(g,false);
  }
  if(g.bx>PW){
    g.lScore++;
    if(g.lScore>=WIN_SCORE){g.winner="left";g.winFlash=100;g.lScore=0;g.rScore=0;}
    else resetBall(g,true);
  }

  if(g.flash>0) g.flash--;

  /* ── Second ball ── */
  // Countdown to spawn
  if(!g.b2active && !g.winner && !g.serving){
    g.b2spawnCountdown--;
    if(g.b2spawnCountdown<=0) spawnBall2(g);
  }
  if(g.b2active){
    g.b2timer++;
    const prevB2x=g.b2x;
    g.b2x+=g.b2vx; g.b2y+=g.b2vy;
    // Walls
    if(g.b2y-BALL_R<=0){g.b2y=BALL_R;g.b2vy=Math.abs(g.b2vy);g.b2flash=6;}
    if(g.b2y+BALL_R>=PH){g.b2y=PH-BALL_R;g.b2vy=-Math.abs(g.b2vy);g.b2flash=6;}
    // AI paddle
    if(g.b2vx<0&&prevB2x-BALL_R>lx&&g.b2x-BALL_R<=lx&&g.b2y>=g.lY&&g.b2y<=g.lY+PAD_H){
      g.b2vx=Math.abs(g.b2vx)*1.04;
      g.b2vy=((g.b2y-(g.lY+PAD_H/2))/(PAD_H/2))*8;
      g.b2x=lx+BALL_R; g.b2flash=8;
    }
    // Player paddle
    if(g.b2vx>0&&prevB2x+BALL_R<rx&&g.b2x+BALL_R>=rx&&g.b2y>=g.rY&&g.b2y<=g.rY+PAD_H){
      g.b2vx=-Math.abs(g.b2vx)*1.04;
      g.b2vy=((g.b2y-(g.rY+PAD_H/2))/(PAD_H/2))*8;
      g.b2x=rx-BALL_R; g.b2flash=8;
    }
    // Speed cap
    const spd2=Math.sqrt(g.b2vx*g.b2vx+g.b2vy*g.b2vy);
    if(spd2>20){g.b2vx=g.b2vx/spd2*20;g.b2vy=g.b2vy/spd2*20;}
    // Scoring
    if(g.b2x<0){
      g.rScore++;
      if(g.rScore>=WIN_SCORE){g.winner="right";g.winFlash=100;g.lScore=0;g.rScore=0;}
      removeBall2(g);
      g.b2spawnCountdown=b2Delay();
    } else if(g.b2x>PW){
      g.lScore++;
      if(g.lScore>=WIN_SCORE){g.winner="left";g.winFlash=100;g.lScore=0;g.rScore=0;}
      removeBall2(g);
      g.b2spawnCountdown=b2Delay();
    }
    if(g.b2flash>0) g.b2flash--;
    // Auto-expire after ~20 seconds so it doesn't loop forever
    if(g.b2timer>1200){ removeBall2(g); g.b2spawnCountdown=b2Delay(); }
  }
}

function pongDraw(g){
  pc.clearRect(0,0,PW,PH);

  // Centre line
  pc.setLineDash([12,16]);
  pc.strokeStyle="rgba(34,211,238,0.1)";
  pc.lineWidth=2;
  pc.beginPath();pc.moveTo(PW/2,0);pc.lineTo(PW/2,PH);pc.stroke();
  pc.setLineDash([]);

  // AI label
  pc.font="11px 'DM Mono',monospace";
  pc.fillStyle="rgba(148,163,184,0.3)";
  pc.textAlign="center";
  pc.fillText("AI",PAD_MARGIN+PAD_W/2+30, PH-14);

  // Paddles
  // AI paddle — cyan
  pc.fillStyle="rgba(34,211,238,0.85)";
  pc.shadowColor="rgba(34,211,238,0.4)";pc.shadowBlur=12;
  pc.beginPath();pc.roundRect(PAD_MARGIN,g.lY,PAD_W,PAD_H,7);pc.fill();
  pc.shadowBlur=0;
  // Player paddle — amber
  pc.fillStyle="rgba(251,191,36,0.88)";
  pc.shadowColor="rgba(251,191,36,0.4)";pc.shadowBlur=12;
  pc.beginPath();pc.roundRect(PW-PAD_MARGIN-PAD_W,g.rY,PAD_W,PAD_H,7);pc.fill();
  pc.shadowBlur=0;

  // Ball
  pc.beginPath();
  pc.arc(g.bx,g.by,BALL_R,0,Math.PI*2);
  if(g.flash>0){pc.fillStyle="#fff";pc.shadowColor="#fff";pc.shadowBlur=22;}
  else{pc.fillStyle="#4ade80";pc.shadowColor="#4ade80";pc.shadowBlur=18;}
  pc.fill();pc.shadowBlur=0;

  // Second ball (orange/amber)
  if(g.b2active){
    pc.beginPath();
    pc.arc(g.b2x,g.b2y,BALL_R,0,Math.PI*2);
    if(g.b2flash>0){pc.fillStyle="#fff";pc.shadowColor="#fff";pc.shadowBlur=22;}
    else{pc.fillStyle="#f97316";pc.shadowColor="#f97316";pc.shadowBlur=18;}
    pc.fill();pc.shadowBlur=0;
  }

  // Mode label (bottom center) — confirms live mode
  const modeLabel = aiDifficulty==='impossible' ? '⬡ IMPOSSIBLE' : aiDifficulty==='super' ? '☠ SUPER' : aiDifficulty.toUpperCase();
  const modeColor = aiDifficulty==='impossible' ? 'rgba(232,121,249,0.55)' : aiDifficulty==='super' ? 'rgba(248,113,113,0.5)' : 'rgba(148,163,184,0.35)';
  pc.font="11px 'DM Mono',monospace";
  pc.fillStyle=modeColor;
  pc.textAlign="center";
  pc.fillText(modeLabel, PW/2, PH-14);

  // Serve text
  if(g.serving){
    pc.font="13px 'DM Mono',monospace";
    pc.fillStyle="rgba(148,163,184,0.5)";
    pc.textAlign="center";
    pc.fillText("serving...",PW/2,PH/2+60);
  }

  // Winner banner
  if(g.winner){
    const alpha=0.18+0.08*Math.sin(g.winFlash*0.25);
    pc.fillStyle=`rgba(34,211,238,${alpha})`;
    pc.fillRect(0,0,PW,PH);
    pc.font=`bold ${Math.round(PH*0.08)}px 'DM Serif Display',serif`;
    pc.fillStyle="rgba(241,245,249,0.9)";
    pc.textAlign="center";pc.textBaseline="middle";
    pc.fillText(g.winner==="left"?"AI WINS":"YOU WIN",PW/2,PH/2);
    pc.textBaseline="alphabetic";
  }

  // Update score DOM
  psLeft.textContent=g.lScore;
  psRight.textContent=g.rScore;
}

function pongLoop(){
  if(!pongRunning) return;
  pongStep(pong);
  pongDraw(pong);
  pongRaf=requestAnimationFrame(pongLoop);
}

function openPong(){
  pong=makePong();
  pongRunning=true;
  dvdEl.classList.add("hidden");
  pongOverlay.classList.add("active");
  pongLoop();
}

function closePong(){
  pongRunning=false;
  if(pongRaf) cancelAnimationFrame(pongRaf);
  pongOverlay.classList.remove("active");
  dvdEl.classList.remove("hidden");
  if(pong) removeBall2(pong);
}

document.querySelectorAll(".diff-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    aiDifficulty=btn.dataset.diff;
    btn.blur(); // return focus to window so arrow keys keep working
    if(pong){
      pong.aiJitter=0;
      pong.aiTarget=PH/2;
      if(!pong.b2active) pong.b2spawnCountdown=b2Delay();
      if(!pong.serving && !pong.winFlash && !pong.winner){
        resetBall(pong, Math.random()>0.5);
        removeBall2(pong);
        pong.b2spawnCountdown=b2Delay();
      }
    }
  });
});

pongBtn.addEventListener("click", openPong);
pongClose.addEventListener("click", closePong);

/* Main tick — also updates pong clock */
let lastHour=-1;
function tick(){
  const now=new Date(),total=END-START,frac=Math.max(0,Math.min(1,(now-START)/total));
  const timeStr=fmtDHMS(END-now);
  const pctStr=(frac*100).toFixed(2)+"% complete";

  document.getElementById("timeleft").textContent=timeStr;
  document.getElementById("daterange").textContent=fmtDate(START)+" → "+fmtDate(END);
  pongPct.textContent=pctStr;

  drawRing(frac);
  const sec=now.getSeconds();
  if(sec!==lastSec){triggerPulse();lastSec=sec;}
  const hr=now.getHours();
  if(hr!==lastHour){updateBackground();lastHour=hr;}
  setTimeout(tick,250);
}
updateBackground();
tick();
</script>
</body>
